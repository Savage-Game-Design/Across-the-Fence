displayName = "Desperate Escape"

description = """
When you're incapacitated due to your injuries, you've got two options available to you:
- Wait for help from your team
- Perform a desperate escape

You can only make a desperate escape once per mission, or twice if you're playing alone.

If you attempt a desperate escape, you'll scramble to get away from the enemy and reappear at a safe area nearby fully recovered.

In your haste, you'll lose your backpack and several consumable items in the process.
"""

tip = "Recon teams would ditch their rucks in desperate circumstances so they could move faster."

# Note that this is a literal string with ', so backslashes don't need escaping.
image = 'assets\atf_logo.paa'

[hints.desperate_escape]
description = """
When downed, once per mission you can conduct a desperate escape to get to safety. Lose your backback and some other items.
"""
