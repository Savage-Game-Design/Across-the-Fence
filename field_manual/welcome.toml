displayName = "Welcome"

description = """
Welcome to the [h]Alpha[/h] version of [h]{1}[/h]!

As a Patreon subscriber, you've got exclusive access the early versions of the gamemode, \
and the ability to influence its ongoing development.

Before playing, [h]it's strongly recommended you read 'Getting started'[/h] in the field manual.

As we progress from Alpha onwards to a full release, we'd love to hear your feedback in Discord, \
