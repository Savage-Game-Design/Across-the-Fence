The initial [h]Alpha[/h] version of [h]{1}[/h] has most of the gamemode's core mission gameplay in place, \
but other aspects of the gamemode are still in development, including:
- Non-recon mission types
- A persistent campaign
- Additional points of interest to interact with and explore while on missions
- Many quality of life features (e.g a shooting range)

[h]{1}[/h] is currently designed for 1 to 6 players on a mission, with up to 4 simultaneous missions running on (a sufficiently powerful) server.
Please try playing solo, duo and in larger groups, so we build a gamemode everyone can enjoy!

Thanks for reading, and enjoy the game!
> The [h]{1}[/h] development team.
